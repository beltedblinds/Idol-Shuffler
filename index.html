<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Idols Media Test</title>
  <style>
    #imageContainer img {
      max-width: 150px;
      margin: 5px;
      border: 1px solid #ccc;
    }
    #debug {
      margin-top: 20px;
      padding: 10px;
      border: 1px solid #000;
      height: 200px;
      overflow-y: auto;
      font-family: monospace;
      background: #f9f9f9;
    }
  </style>
</head>
<body>
  <h1>Idols Media Test</h1>
  <input type="text" id="search" placeholder="Search idol..." />
  <div id="imageContainer"></div>
  <div id="debug"></div>

  <script>
    const debugEl = document.getElementById('debug');

    function logDebug(message) {
      const p = document.createElement('p');
      p.textContent = message;
      debugEl.appendChild(p);
      debugEl.scrollTop = debugEl.scrollHeight; // scroll to bottom
      console.log(message);
    }

    let manifest = [];
    let filteredImages = [];

    // Load the manifest.json
    fetch('manifest.json')
      .then(res => res.json())
      .then(data => {
        manifest = data;
        filteredImages = manifest;
        displayImages();
        logDebug(`Manifest loaded: ${manifest.length} entries`);
      })
      .catch(err => logDebug(`Failed to load manifest.json: ${err}`));

    // Search input
    document.getElementById('search').addEventListener('input', (e) => {
      const query = e.target.value.toLowerCase();
      filteredImages = manifest.filter(item => item.path.toLowerCase().includes(query));
      displayImages();
      logDebug(`Search query: "${query}" — ${filteredImages.length} matches`);
    });

    // Display images
    function displayImages(images = filteredImages) {
      const container = document.getElementById('imageContainer');
      container.innerHTML = '';

      images.forEach(img => {
        const imageEl = document.createElement('img');
        imageEl.src = img.path;

        imageEl.onerror = () => logDebug(`Failed to load: ${img.path}`);
        imageEl.onload = () => logDebug(`Loaded: ${img.path}`);

        container.appendChild(imageEl);
      });

      if (images.length === 0) logDebug('No images to display');
    }
  </script>
</body>
</html>
