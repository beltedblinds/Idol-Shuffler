<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Idol Shuffler</title>
<style>
  body { font-family: Arial, sans-serif; padding: 20px; }
  #search { margin-bottom: 20px; padding: 5px; width: 300px; }
  #imageContainer img { max-width: 200px; margin: 5px; display: block; }
  #shuffleBtn { margin-top: 10px; padding: 5px 10px; }
</style>
</head>
<body>

<h1>Idol Shuffler</h1>

<input type="text" id="search" placeholder="Search an idol name..." />
<button id="shuffleBtn">Shuffle</button>
<div id="imageContainer"></div>

<script>
let manifest = [];
let filteredImages = [];

// Load manifest.json from your repo
fetch('idols-media-01/manifest.json')
  .then(response => response.json())
  .then(data => {
    manifest = data;
    filteredImages = manifest;
    displayImages();
  })
  .catch(err => {
    console.error('Failed to load manifest:', err);
    document.getElementById('imageContainer').textContent = 'Failed to load manifest.';
  });

// Search functionality
document.getElementById('search').addEventListener('input', (e) => {
  const query = e.target.value.toLowerCase();
  filteredImages = manifest.filter(item => item.path.toLowerCase().includes(query));
  displayImages();
});

// Shuffle functionality
document.getElementById('shuffleBtn').addEventListener('click', () => {
  if (filteredImages.length === 0) return;
  const randomIndex = Math.floor(Math.random() * filteredImages.length);
  displayImages([filteredImages[randomIndex]]);
});

// Display images
function displayImages(images = filteredImages) {
  const container = document.getElementById('imageContainer');
  container.innerHTML = '';
  images.forEach(img => {
    const imageEl = document.createElement('img');
    imageEl.src = img.path;
    container.appendChild(imageEl);
  });
}
</script>

</body>
</html>
